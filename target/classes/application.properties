spring.application.name=courier-service

# Server
server.port=8002

# Database - H2 for local development, PostgreSQL in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:courier_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.h2.console.enabled=true

# Fjernet security for nu
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# JPA - Auto-detect dialect based on database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DIALECT:}

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.path=/graphql
spring.jpa.open-in-view=false

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


